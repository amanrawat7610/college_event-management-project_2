
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=1.1">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .form-card {
            width: 450px;
            border-top: 5px solid #e53e3e;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            text-decoration: none;
            display: inline-block;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .form-card {
                width: 90%;
                max-width: 400px;
                padding: 30px;
            }
            h1 {
                font-size: 28px;
            }
            p {
                font-size: 15px;
            }
            .btn-submit {
                padding: 14px;
                font-size: 15px;
            }
        }

        @media (max-width: 480px) {
            .form-card {
                width: 95%;
                padding: 25px;
            }
            h1 {
                font-size: 24px;
            }
            p {
                font-size: 14px;
            }
            .btn-submit {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="form-card">
        <h1 style="color:#e53e3e; font-weight: 700;">Access Denied!</h1>
        <p style="color: #4a5568; font-size: 16px;">Only the Admin can view the student list. Please login to continue.</p>
        <br>
        <a href="/login" class="btn-submit">Go to Admin Login</a>
        <br><br>
        <a href="/" style="color:#667eea; text-decoration:none; font-weight: 600;">Back to Home</a>
    </div>
</body>
</html>

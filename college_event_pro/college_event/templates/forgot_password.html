<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - College Event Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=1.1">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Modern Navbar consistent with Login/Signup */
        .navbar-custom { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 12px 5%; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-bottom: 3px solid #667eea;
            z-index: 1000;
        }

        .navbar-custom a { 
            color: #4a5568; 
            text-decoration: none; 
            font-weight: 600; 
            padding: 8px 18px; 
            border-radius: 8px; 
            transition: 0.3s; 
            font-size: 14px;
        }

        .navbar-custom a:hover { 
            background: #667eea;
            color: white; 
        }

        .forgot-container {
            flex-grow: 1;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }

        /* Professional Form Card */
        .form-card { 
            background: #ffffff;
            padding: 40px; 
            border-radius: 24px; 
            width: 100%;
            max-width: 440px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            border-top: 6px solid #667eea;
            box-sizing: border-box;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { 
            text-align: center; 
            color: #2d3748; 
            margin-bottom: 8px; 
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
            font-size: 14px;
        }

        label { 
            font-size: 12px; 
            color: #4a5568; 
            font-weight: 700; 
            display: block; 
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 18px; 
            border: 2px solid #edf2f7; 
            border-radius: 12px; 
            box-sizing: border-box; 
            background: #f8fafc;
            transition: 0.3s;
            font-size: 15px;
        }

        input:focus {
            border-color: #667eea;
            background: white;
            outline: none;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn-submit { 
            width: 100%; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 10px 15px rgba(102, 126, 234, 0.3);
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover { 
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(102, 126, 234, 0.4);
        }

        .alert-msg {
            background: #fff5f5;
            color: #c53030;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            border: 1px solid #feb2b2;
            text-align: center;
            font-weight: 600;
        }

        .back-link { 
            text-align: center; 
            margin-top: 25px; 
            font-size: 14px; 
        }

        .back-link a { 
            color: #667eea; 
            text-decoration: none; 
            font-weight: 700; 
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .form-card { padding: 30px 20px; }
            .navbar-custom span { display: none; }
        }
    </style>
</head>
<body>
    <nav class="navbar-custom">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="College Logo" style="height: 40px; margin-right: 15px;" onerror="this.style.display='none'">
        <span style="font-size: 22px; font-weight: 800; color: #667eea;">College Event Hub</span>
        <div>
            <a href="/">Home</a>
            <a href="/register">Add Student</a>
            <a href="/login">Login</a>
            <button class="dark-mode-toggle" onclick="toggleDarkMode()" title="Toggle Dark/Light Mode">🌙</button>
        </div>
    </nav>
    
    <div class="forgot-container">
        <div class="form-card">
            <h2>Reset Password</h2>
            <p class="subtitle">Security check to update your credentials</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert-msg">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/forgot_password" method="POST">
                <label>Master Security Key</label>
                <input type="password" name="master_key" placeholder="••••••••" required>
                
                <label>Registered Email</label>
                <input type="email" name="email" placeholder="admin@college.com" required>
                
                <label>Set New Password</label>
                <input type="password" name="new_password" placeholder="Create new password" required>
                
                <button type="submit" class="btn-submit">UPDATE PASSWORD</button>
            </form>

            <div class="back-link">
                <a href="/login">← Back to Login</a>
            </div>
        </div>
    </div>

<script>
    function toggleDarkMode() {
        const isDarkMode = localStorage.getItem('darkMode') === 'true';
        const newMode = !isDarkMode;
        localStorage.setItem('darkMode', newMode);
        applyDarkMode(newMode);
    }
    
    function applyDarkMode(enable) {
        const body = document.body;
        const toggle = document.querySelector('.dark-mode-toggle');
        if (enable) {
            body.classList.add('dark-mode');
            toggle.textContent = '☀️';
            toggle.title = 'Switch to Light Mode';
        } else {
            body.classList.remove('dark-mode');
            toggle.textContent = '🌙';
            toggle.title = 'Switch to Dark Mode';
        }
    }
    
    window.addEventListener('load', function() {
        const isDarkMode = localStorage.getItem('darkMode') === 'true';
        applyDarkMode(isDarkMode);
    });
</script>
</body>
</html>
